      <circle cx="68" cy="61" r="1.2" fill="#eacb84" opacity=".22"/>
      <circle cx="25" cy="69" r=".65" fill="#eacb84" opacity=".25"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grain)" opacity=".7"/>
  <ellipse cx="640" cy="370" rx="410" ry="330" fill="url(#halo)" filter="url(#soft)"/>

