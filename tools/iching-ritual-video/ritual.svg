<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="68%">
      <stop offset="0" stop-color="#302314"/>
      <stop offset=".5" stop-color="#17130f"/>
      <stop offset="1" stop-color="#090807"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e7bd67" stop-opacity=".38"/>
      <stop offset=".42" stop-color="#b4782f" stop-opacity=".12"/>
      <stop offset="1" stop-color="#5a3618" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d996"/>
      <stop offset=".35" stop-color="#b77b2b"/>
      <stop offset=".65" stop-color="#f0c46d"/>
      <stop offset="1" stop-color="#6c421b"/>
    </linearGradient>
    <linearGradient id="inkGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edd087" stop-opacity=".9"/>
      <stop offset="1" stop-color="#97703a" stop-opacity=".2"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
