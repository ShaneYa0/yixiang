<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="paperGlow" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#fff6e8"/>
      <stop offset="52%" stop-color="#efe4d3"/>
      <stop offset="100%" stop-color="#1f1b17"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8a7" stop-opacity="1"/>
      <stop offset="42%" stop-color="#c99743" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#3b2a16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c77a"/>
      <stop offset="40%" stop-color="#8a5f2e"/>
      <stop offset="72%" stop-color="#2c2416"/>
      <stop offset="100%" stop-color="#d2a24d"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f8790" stop-opacity=".08"/>
      <stop offset="45%" stop-color="#d9c7aa" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#f4d98b" stop-opacity=".8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <style>
      .panel-title{font:600 18px "Microsoft YaHei", "PingFang SC", sans-serif;letter-spacing:.2em;fill:#f3dfb9}
      .panel-note{font:400 13px "Microsoft YaHei", "PingFang SC", sans-serif;letter-spacing:.12em;fill:#bca985}
      .line{stroke:#e8c77d;stroke-width:8;stroke-linecap:round;filter:url(#soft)}
      .trigram{stroke:#c5a05b;stroke-width:3;opacity:.7}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#181511"/>
  <rect x="40" y="40" width="1520" height="820" rx="0" fill="url(#paperGlow)" opacity=".55"/>
  <text x="800" y="92" text-anchor="middle" class="panel-title">铜炉问天 · 起卦动效分镜</text>
  <text x="800" y="124" text-anchor="middle" class="panel-note">静心 → 升气 → 定爻 → 成卦</text>

  <g transform="translate(70,165)">
    <rect width="340" height="610" fill="#f7efe3" opacity=".86" stroke="#d7c9b5"/>
    <text x="170" y="46" text-anchor="middle" fill="#2c2416" font-size="20" font-family="serif" letter-spacing=".25em">01 静心</text>
    <circle cx="170" cy="260" r="116" fill="url(#goldGlow)" opacity=".55"/>
    <path d="M138 365 C150 320 190 320 202 365 Z" fill="url(#bronze)"/>
    <ellipse cx="170" cy="365" rx="88" ry="20" fill="#4a321b"/>
    <ellipse cx="170" cy="334" rx="62" ry="14" fill="#d0a25a" opacity=".85"/>
    <path d="M152 306 C120 248 180 234 150 176 C208 234 160 248 196 306" fill="none" stroke="url(#smoke)" stroke-width="15" stroke-linecap="round" opacity=".62"/>
    <path d="M190 312 C230 258 174 234 220 188 C184 238 236 262 202 314" fill="none" stroke="url(#smoke)" stroke-width="10" stroke-linecap="round" opacity=".35"/>
    <text x="170" y="490" text-anchor="middle" fill="#6f604f" font-size="15" letter-spacing=".12em">页面安静，铜炉微亮</text>
    <text x="170" y="520" text-anchor="middle" fill="#8d7a63" font-size="13">先让用户进入“要开始了”的状态</text>
  </g>

  <g transform="translate(445,165)">
    <rect width="340" height="610" fill="#1f1b17" opacity=".94" stroke="#5a4a35"/>
    <text x="170" y="46" text-anchor="middle" class="panel-title">02 升气</text>
    <circle cx="170" cy="258" r="132" fill="url(#goldGlow)" opacity=".65"/>
    <path d="M170 134 C252 140 278 234 216 280 C166 316 114 268 154 226 C178 202 212 220 202 250 C196 270 170 270 162 252" fill="none" stroke="#e4c37b" stroke-width="8" stroke-linecap="round" opacity=".86"/>
    <path d="M170 382 C88 376 62 282 124 236 C174 200 226 248 186 290 C162 314 128 296 138 266 C144 246 170 246 178 264" fill="none" stroke="#7894a1" stroke-width="8" stroke-linecap="round" opacity=".58"/>
    <circle cx="170" cy="258" r="72" fill="none" stroke="#e4c37b" stroke-width="2" stroke-dasharray="6 12" opacity=".7"/>
    <g transform="translate(170 258)">
      <line class="trigram" x1="-150" y1="0" x2="-128" y2="0"/>
      <line class="trigram" x1="128" y1="0" x2="150" y2="0"/>
      <line class="trigram" x1="0" y1="-150" x2="0" y2="-128"/>
      <line class="trigram" x1="0" y1="128" x2="0" y2="150"/>
      <line class="trigram" x1="-105" y1="-105" x2="-90" y2="-90"/>
      <line class="trigram" x1="105" y1="-105" x2="90" y2="-90"/>
      <line class="trigram" x1="-105" y1="105" x2="-90" y2="90"/>
      <line class="trigram" x1="105" y1="105" x2="90" y2="90"/>
    </g>
    <text x="170" y="490" text-anchor="middle" fill="#e8c77d" font-size="15" letter-spacing=".12em">烟气变成太极云旋</text>
    <text x="170" y="520" text-anchor="middle" fill="#bca985" font-size="13">八卦方位不是装饰，是仪式中心</text>
  </g>

  <g transform="translate(820,165)">
    <rect width="340" height="610" fill="#15120f" opacity=".96" stroke="#5a4a35"/>
    <text x="170" y="46" text-anchor="middle" class="panel-title">03 定爻</text>
    <circle cx="170" cy="258" r="142" fill="url(#goldGlow)" opacity=".7"/>
    <g opacity=".9">
      <ellipse cx="102" cy="222" rx="42" ry="16" fill="url(#bronze)" transform="rotate(-22 102 222)"/>
      <rect x="91" y="215" width="22" height="14" fill="#23190f" transform="rotate(-22 102 222)"/>
      <ellipse cx="225" cy="190" rx="47" ry="18" fill="url(#bronze)" transform="rotate(38 225 190)"/>
      <rect x="213" y="183" width="24" height="15" fill="#23190f" transform="rotate(38 225 190)"/>
      <ellipse cx="184" cy="326" rx="44" ry="17" fill="url(#bronze)" transform="rotate(12 184 326)"/>
      <rect x="172" y="319" width="24" height="14" fill="#23190f" transform="rotate(12 184 326)"/>
    </g>
    <path d="M76 354 C120 306 216 300 268 350" fill="none" stroke="#e4c37b" stroke-width="3" stroke-dasharray="8 12" opacity=".65"/>
    <path d="M92 188 C142 126 230 120 262 188" fill="none" stroke="#7894a1" stroke-width="2" stroke-dasharray="6 10" opacity=".48"/>
    <text x="170" y="490" text-anchor="middle" fill="#e8c77d" font-size="15" letter-spacing=".12em">铜钱从云里落下翻面</text>
    <text x="170" y="520" text-anchor="middle" fill="#bca985" font-size="13">每次碰撞都推动一爻生成</text>
  </g>

  <g transform="translate(1195,165)">
    <rect width="340" height="610" fill="#f5ecdd" opacity=".9" stroke="#d7c9b5"/>
    <text x="170" y="46" text-anchor="middle" fill="#2c2416" font-size="20" font-family="serif" letter-spacing=".25em">04 成卦</text>
    <circle cx="170" cy="248" r="130" fill="url(#goldGlow)" opacity=".8"/>
    <g transform="translate(170 170)">
      <line class="line" x1="-58" y1="0" x2="58" y2="0"/>
      <line class="line" x1="-58" y1="28" x2="-15" y2="28"/>
      <line class="line" x1="15" y1="28" x2="58" y2="28"/>
      <line class="line" x1="-58" y1="56" x2="58" y2="56"/>
      <line class="line" x1="-58" y1="84" x2="58" y2="84"/>
      <line class="line" x1="-58" y1="112" x2="-15" y2="112"/>
      <line class="line" x1="15" y1="112" x2="58" y2="112"/>
      <line class="line" x1="-58" y1="140" x2="58" y2="140"/>
    </g>
    <path d="M130 402 C150 338 194 338 212 402" fill="url(#bronze)"/>
    <ellipse cx="170" cy="402" rx="86" ry="18" fill="#4a321b"/>
    <path d="M98 348 C160 300 204 300 246 348" fill="none" stroke="#e8c77d" stroke-width="3" opacity=".58"/>
    <text x="170" y="490" text-anchor="middle" fill="#6f604f" font-size="15" letter-spacing=".12em">六爻悬浮，光雾退开</text>
    <text x="170" y="520" text-anchor="middle" fill="#8d7a63" font-size="13">结果出现时要有“交付感”</text>
  </g>
</svg>
